name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin windows-2022 (not windows-latest) — the rolling latest image
          # now points at windows-2025, where node-gyp can't locate Visual
          # Studio Build Tools and the uiohook-napi rebuild fails. v0.4.1
          # broke on this; pinning keeps the runner image stable.
          - os: windows-2022
            target: dist:win
            artifact: "*.exe"
          - os: macos-latest
            target: dist:mac
            artifact: "*.dmg"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    env:
      FDM_API_BASE: https://api.fourdm.services
      # Baked into the bundle for electron-updater (private GitHub repo).
      FDM_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Sentry DSN is safe to expose; baked at build time so installed
      # clients report errors. Set FDM_SENTRY_DSN as a repo secret.
      FDM_SENTRY_DSN: ${{ secrets.FDM_SENTRY_DSN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      # Used by electron-builder to upload artifacts + latest.yml to the
      # Release matching this tag. GITHUB_TOKEN works for the same repo.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Build installer + publish to GitHub Releases
        run: npm run ${{ matrix.target }} -- --publish always
        env:
          # electron-builder's github publisher reads this name.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (workflow record)
        uses: actions/upload-artifact@v4
        with:
          name: fdm-tracker-${{ matrix.os }}
          path: desktop/release/${{ matrix.artifact }}
          if-no-files-found: error
