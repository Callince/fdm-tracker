appId: com.fourdm.tracker
productName: FDM Tracker
directories:
  output: release
  buildResources: resources
files:
  - out/**
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
# Ship the brand icon at runtime so the tray, dock, and notification
# windows can load it via process.resourcesPath/icon.png. Without this
# the tray ends up with an empty nativeImage and looks invisible.
extraResources:
  - from: resources/icon.png
    to: icon.png
asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/uiohook-napi/**"
# Ship en-US only — drops ~10 MB of bundled locales.
electronLanguages:
  - en-US
# Maximum compression: smaller download, slower install (one-time).
compression: maximum

win:
  target:
    - target: nsis
      arch: [x64]
  # electron-builder auto-generates .ico from a 256×256+ PNG.
  icon: resources/icon.png
  artifactName: ${productName}-${version}-setup-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  # Keeps the installer bundle compressed too (default is store).
  differentialPackage: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  # electron-builder auto-generates .icns from a 512×512+ PNG.
  icon: resources/icon.png
  category: public.app-category.productivity
  # No code signing for internal distribution — Gatekeeper will warn on first run.
  identity: null
  notarize: false

publish:
  - provider: github
    owner: Callince
    repo: fdm-tracker
    private: true
    releaseType: release
