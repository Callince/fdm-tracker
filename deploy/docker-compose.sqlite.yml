# SQLite production override.
#
# SQLite is the system of record. Always apply this ON TOP of
# docker-compose.prod.yml so the app serves from a SQLite file on a
# persistent named volume on the droplet — see deploy/SQLITE_PROD.md.
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.sqlite.yml \
#     --env-file .env up -d --build
#
# Changes vs. the (now-dormant) Postgres path in docker-compose.prod.yml:
#   - DATABASE_URL -> sqlite file on a persistent named volume
#   - skip Alembic (Postgres-only migrations); init schema via the ORM
#   - 1 uvicorn worker (SQLite is single-writer; multiple workers
#     contend for the file lock)
#
# Postgres remains supported for rollback: set a postgresql:// DATABASE_URL
# in .env and deploy WITHOUT this override (see SQLITE_PROD.md "Revert").
name: fdm-tracker

services:
  api:
    # The image runs as non-root `appuser` (uid 1000), but a Docker
    # named volume is created root-owned — appuser then can't create
    # /data/fdm.db and the container crash-loops (502). For this
    # stopgap we run the container as root so it can write the volume.
    # Accepted trade-off; reverting to the Postgres compose drops it.
    user: "0:0"
    environment:
      # `environment` overrides the same key from env_file (.env).
      # 4 slashes = absolute path /data/fdm.db inside the container.
      DATABASE_URL: "sqlite:////data/fdm.db"
    volumes:
      - fdm_sqlite:/data
    command: >
      sh -c "python -m app.cli.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  fdm_sqlite:
