version: "3.9"

# Base compose file. SQLite is the only database — it lives on a named
# volume so it survives `down`/rebuilds.
# Local dev: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`
# Production: see deploy/docker-compose.prod.yml.

services:
  api:
    build: .
    env_file: .env
    environment:
      # 4 slashes = absolute path /data/fdm.db inside the container.
      DATABASE_URL: sqlite:////data/fdm.db
    volumes:
      - fdm_sqlite:/data
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.cli.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  fdm_sqlite:
